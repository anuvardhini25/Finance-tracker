<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="auth-container">

<form
class="auth-card"
id="loginForm"
>

<h2>
Welcome Back 👋
</h2>

<input
type="email"
id="loginEmail"
placeholder="Enter Email"
required
>

<input
type="password"
id="loginPassword"
placeholder="Enter Password"
required
>

<button type="submit">
Login
</button>

<p>

Don't have an account?

<a href="register.html">
Register
</a>

</p>

</form>

</div>

<script src="js/auth.js"></script>

</body>
</html>
